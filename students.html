<script src="js/navbar.js"></script>
<link rel="stylesheet" href="css/styles.css">

<h1 data-translate>Student Stories</h1>

<div class="card">
<p data-translate>Read stories from learners around the world.</p>
</div>
<script src="js/lang.js"></script>
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Student Stories Map</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<!-- Bootstrap -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #f7f7f7;
}

h1 {
  text-align: center;
  margin: 20px 0;
}

/* MAP CONTAINER */
.map-container {
  position: relative;
  width: 100%;
  max-width: 1000px;
  margin: auto;
}

.map-container img {
  width: 100%;
  border-radius: 12px;
}

/* DOT STYLE */
.dot {
  position: absolute;
  width: 14px;
  height: 14px;
  background: #e63946;
  border-radius: 50%;
  cursor: pointer;
  border: 2px solid white;
  transform: translate(-50%, -50%);
  transition: transform 0.2s;
}

.dot:hover {
  transform: translate(-50%, -50%) scale(1.3);
}

/* simple legend */
.legend {
  text-align: center;
  margin-top: 10px;
  color: #555;
}
</style>
</head>

<body>

<h1>Student Story Map</h1>

<div class="map-container">

  <!-- US MAP IMAGE -->
  <img src="US.jpeg" alt="Map">

  <!-- DOTS (positions are % so responsive) -->

  <div class="dot" style="top: 60%; left: 20%;" 
       onclick="openCard('Indiana Student', 'From rural Indiana, she learned to reconnect with her heritage through stories she was never told.', 'story-indiana.html')"></div>

  <div class="dot" style="top: 55%; left: 75%;" 
       onclick="openCard('New York Student', 'A city girl navigating identity, culture, and pressure in the heart of NYC.', 'story-nyc.html')"></div>

  <div class="dot" style="top: 65%; left: 35%;" 
       onclick="openCard('Virginia Student', 'Raised in rural Virginia, he struggles between tradition and change.', 'story-virginia.html')"></div>

  <div class="dot" style="top: 26%; left: 80%;" 
       onclick="openCard('Texas Student', 'Raised in both Mexico and America, he had a strong support network of other Spanish speakers.', 'story-virginia.html')"></div>
 
  <div class="dot" style="top: 70%; left: 50%;" 
       onclick="openCard('Pittsburgh Student', 'An urban student learning to balance community, grief, and ambition.', 'story-pittsburgh.html')"></div>

</div>

<div class="legend">
Click a dot to explore a student story
</div>

<!-- BOOTSTRAP MODAL -->
<div class="modal fade" id="storyModal" tabindex="-1">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content">

      <div class="modal-header">
        <h5 class="modal-title" id="modalTitle"></h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>

      <div class="modal-body">
        <p id="modalText"></p>
        <a id="modalLink" class="btn btn-primary" href="#">Read Full Story</a>
      </div>

    </div>
  </div>
</div>

<!-- SCRIPT -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

<script>
function openCard(title, text, link) {
  document.getElementById("modalTitle").innerText = title;
  document.getElementById("modalText").innerText = text;
  document.getElementById("modalLink").href = link;

  const modal = new bootstrap.Modal(document.getElementById('storyModal'));
  modal.show();
}
</script>

</body>
</html>
