<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Language Chat</title>

<link rel="stylesheet" href="css/styles.css">

<script src="js/navbar.js"></script>
<script src="js/lang.js"></script>

<style>
.language-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
  gap: 15px;
  margin: 20px;
}

.lang-btn {
  padding: 15px;
  border-radius: 12px;
  border: none;
  cursor: pointer;
  background: rgba(255,255,255,0.15);
  color: white;
  font-size: 16px;
  backdrop-filter: blur(10px);
  transition: 0.3s;
}

.lang-btn:hover {
  transform: translateY(-3px);
  background: rgba(255,255,255,0.25);
}
</style>

</head>

<body>

<h1 data-key="chat">Language Chat</h1>

<div class="card">
  <p>Choose a language to join a chat room:</p>
</div>

<div class="language-grid">

  <button class="lang-btn" onclick="joinChat('en')">English</button>
  <button class="lang-btn" onclick="joinChat('es')">Español</button>
  <button class="lang-btn" onclick="joinChat('pt')">Português</button>
  <button class="lang-btn" onclick="joinChat('zh')">中文</button>
  <button class="lang-btn" onclick="joinChat('fr')">Français</button>
  <button class="lang-btn" onclick="joinChat('de')">Deutsch</button>
  <button class="lang-btn" onclick="joinChat('ar')">العربية</button>
  <button class="lang-btn" onclick="joinChat('hi')">हिन्दी</button>
  <button class="lang-btn" onclick="joinChat('ja')">日本語</button>
  <button class="lang-btn" onclick="joinChat('ko')">한국어</button>
  <button class="lang-btn" onclick="joinChat('ru')">Русский</button>

</div>

<script>
function joinChat(lang){
  // redirect to chat room (you can build this next)
  window.location.href = `chatroom.html?lang=${lang}`;
}
</script>

<script type="module" src="js/firebase.js"></script>
<script type="module" src="js/chat.js"></script>

</body>
</html>
