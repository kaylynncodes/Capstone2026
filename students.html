<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Student Stories</title>

<link rel="stylesheet" href="css/styles.css">

<script src="js/navbar.js"></script>
<script src="js/lang.js"></script>

<!-- Bootstrap -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

.subtitle {
  text-align: center;
  margin-bottom: 20px;
  font-size: 18px;
  opacity: 0.85;
}

.map-card {
  max-width: 1000px;
  margin: 20px auto;
}

.map-container {
  position: relative;
}

.map-container img {
  width: 100%;
  border-radius: 15px;
  box-shadow: 0 10px 30px rgba(0,0,0,0.3);
}

.dot {
  position: absolute;
  width: 14px;
  height: 14px;
  background: #ff4d6d;
  border-radius: 50%;
  cursor: pointer;
  border: 2px solid white;
  transform: translate(-50%, -50%);
}

.dot:hover {
  transform: translate(-50%, -50%) scale(1.3);
}

.modal-content {
  background: rgba(20,20,30,0.95);
  color: white;
  border-radius: 15px;
}

</style>
</head>

<body>

<div class="container">

<h1 data-key="students">Student Stories</h1>

<p class="subtitle">Click a location to hear a real student story</p>

<!-- 🇺🇸 US MAP -->
<div class="card map-card">
<h2>🇺🇸 United States</h2>

<div class="map-container">
<img src="US.jpeg" alt="US Map">

<div class="dot" style="top:70%; left:46%;" onclick="openCard(stories.jose)"></div>
<div class="dot" style="top:73%; left:42%;" onclick="openCard(stories.hailey)"></div>
<div class="dot" style="top:67%; left:45%;" onclick="openCard(stories.michelle)"></div>

<div class="dot" style="top:30%; left:90%;" onclick="openCard(stories.nada)"></div>
<div class="dot" style="top:65%; left:80%;" onclick="openCard(stories.tracy)"></div>

</div>
</div>

<!-- 🌍 WORLD MAP -->
<div class="card map-card">
<h2>🌍 Global Stories</h2>

<div class="map-container">
<img src="World.jpeg" alt="World Map">

<div class="dot" style="top:20%; left:65%;" onclick="openCard(stories.murk)"></div>

</div>
</div>

</div>

<!-- ✅ MODAL (THIS IS WHERE THE BUTTON GOES) -->
<div class="modal fade" id="storyModal" tabindex="-1">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content">

      <div class="modal-header">
        <h5 id="modalTitle"></h5>
        <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
      </div>

      <div class="modal-body">
        <p id="modalText"></p>

        <!-- ✅ BUTTON IS HERE -->
        <a id="modalLink" href="#" class="btn btn-light" style="margin-top:10px;">
          View Full Story →
        </a>

      </div>

    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

<script>

/* STORIES WITH LINKS */
const stories = {

  jose: {
    title: "Jose — Texas",
    text: "Grew up between Mexico and Texas.",
    link: "story.html?id=jose"
  },

  hailey: {
    title: "Hailey — Texas",
    text: "Fluent in Spanish and English.",
    link: "story.html?id=hailey"
  },

  michelle: {
    title: "Michelle — Texas",
    text: "Transitioned from bilingual to English classes.",
    link: "story.html?id=michelle"
  },

  nada: {
    title: "Nada — New Jersey",
    text: "Speaks multiple languages and faced pressure.",
    link: "story.html?id=nada"
  },

  tracy: {
    title: "Tracy — Georgia",
    text: "Comfortable in English but values native language.",
    link: "story.html?id=tracy"
  },

  murk: {
    title: "Murk — Kazakhstan",
    text: "Learning English in Kazakhstan.",
    link: "story.html?id=murk"
  }

};

/* MODAL FUNCTION */
function openCard(story){
  document.getElementById("modalTitle").innerText = story.title;
  document.getElementById("modalText").innerText = story.text;

  const link = document.getElementById("modalLink");

  if(story.link){
    link.href = story.link;
    link.style.display = "inline-block";
  } else {
    link.style.display = "none";
  }

  const modal = new bootstrap.Modal(document.getElementById('storyModal'));
  modal.show();
}

</script>

</body>
</html>
