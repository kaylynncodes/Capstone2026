<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Study Games</title>
  <link rel="stylesheet" href="css/styles.css">
</head>

<body>

<script src="js/navbar.js"></script>

<h1 data-translate>Study Games</h1>

<div class="card">
  <p>Select a study mode and start playing.</p>
</div>

<div class="game-grid">

  <!-- EMOTIONS -->
  <div class="card">
    <h2>Emotions (Spanish ↔ English)</h2>
    <p>Learn basic feelings vocabulary.</p>
    <a href="snake.html?mode=emotions" class="btn">Play</a>
  </div>

  <!-- VERBS -->
  <div class="card">
    <h2>Verbs & Conjugation</h2>
    <p>Practice common verbs and forms.</p>
    <a href="snake.html?mode=verbs" class="btn">Play</a>
  </div>

  <!-- SENTENCES -->
  <div class="card">
    <h2>Basic Sentences</h2>
    <p>Translate simple phrases.</p>
    <a href="snake.html?mode=sentences" class="btn">Play</a>
  </div>

</div>

<script src="js/lang.js"></script>

<style>
.game-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
  gap: 20px;
  padding: 20px;
}

.btn {
  display: inline-block;
  padding: 10px 20px;
  background: #222;
  color: white;
  text-decoration: none;
  margin-top: 10px;
}
</style>

</body>
</html>
