<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Snake Study Game</title>

<style>
body { margin:0; background:black; color:white; text-align:center; font-family:Arial; }
canvas { background:#111; display:block; margin:auto; }

#quiz-box {
  position:fixed;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.95);
  display:flex;
  justify-content:center;
  align-items:center;
}

.quiz-card {
  background:#111;
  padding:20px;
  border:2px solid #0f0;
}

.hidden { display:none; }
</style>
</head>

<body>

<h1>Snake Study Game</h1>
<canvas id="game" width="400" height="400"></canvas>

<div id="quiz-box" class="hidden">
  <div class="quiz-card">
    <h2 id="question"></h2>
    <input id="answer" placeholder="Type answer">
    <button onclick="checkAnswer()">Submit</button>
    <p id="feedback"></p>
  </div>
</div>

<script>
// --- GAME ---
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

let snake = [{x:10,y:10}];
let food = {x:5,y:5};
let dx=1, dy=0;

document.addEventListener("keydown", e=>{
  if(e.key==="ArrowUp"){dx=0;dy=-1;}
  if(e.key==="ArrowDown"){dx=0;dy=1;}
  if(e.key==="ArrowLeft"){dx=-1;dy=0;}
  if(e.key==="ArrowRight"){dx=1;dy=0;}
});

function draw(){
  if(quizActive) return;

  ctx.clearRect(0,0,400,400);
  snake.unshift({x:snake[0].x+dx,y:snake[0].y+dy});

  if(snake[0].x===food.x && snake[0].y===food.y){
    food={x:Math.floor(Math.random()*20),y:Math.floor(Math.random()*20)};
  } else {
    snake.pop();
  }

  ctx.fillStyle="lime";
  snake.forEach(s=>ctx.fillRect(s.x*20,s.y*20,18,18));

  ctx.fillStyle="red";
  ctx.fillRect(food.x*20,food.y*20,18,18);
}

// --- STUDY SYSTEM ---
const params = new URLSearchParams(window.location.search);
const mode = params.get("mode");
const lang = params.get("lang") || "es"; // es = answer Spanish, en = answer English

// MASTER DATA (PAIR FORMAT)
const data = {
  emotions_vocab: [
    ["happy","feliz"],["sad","triste"],["angry","enojado"],
    ["tired","cansado"],["excited","emocionado"],
    ["nervous","nervioso"],["calm","tranquilo"],
    ["confused","confundido"],["scared","asustado"],
    ["proud","orgulloso"],["jealous","celoso"],
    ["bored","aburrido"],["sick","enfermo"],["stressed","estresado"]
  ],

  verbs_core: [
    ["I am (permanent)","yo soy"],
    ["I am (temporary)","yo estoy"],
    ["I have","yo tengo"],
    ["I want","yo quiero"],
    ["I need","yo necesito"],
    ["I go","yo voy"],
    ["I eat","yo como"],
    ["I drink","yo bebo"]
  ],

  emotions_sentences: [
    ["I am happy","estoy feliz"],
    ["I am sad","estoy triste"],
    ["I feel nervous","me siento nervioso"],
    ["I feel calm","me siento tranquilo"]
  ],

  greetings: [
    ["hello","hola"],
    ["good morning","buenos días"],
    ["good afternoon","buenas tardes"],
    ["good night","buenas noches"],
    ["how are you","cómo estás"],
    ["nice to meet you","mucho gusto"]
  ],

  survival: [
    ["where is the bathroom","dónde está el baño"],
    ["i need help","necesito ayuda"],
    ["can you help me","puedes ayudarme"],
    ["i don't understand","no entiendo"],
    ["please speak slowly","por favor habla despacio"],
    ["how much is this","cuánto cuesta esto"]
  ]
};

let quizActive=false;
let currentAnswer="";

function showQuestion(){
  quizActive=true;

  const set = data[mode];
  const pair = set[Math.floor(Math.random()*set.length)];

  let questionText;

  if(lang==="es"){
    // answer Spanish
    questionText = pair[0] + " → Spanish";
    currentAnswer = pair[1];
  } else {
    // answer English
    questionText = pair[1] + " → English";
    currentAnswer = pair[0];
  }

  document.getElementById("question").innerText = questionText;
  document.getElementById("quiz-box").classList.remove("hidden");
}

function checkAnswer(){
  const input = document.getElementById("answer").value.trim().toLowerCase();
  const correct = currentAnswer.toLowerCase();

  if(input===correct || input.includes(correct) || correct.includes(input)){
    document.getElementById("feedback").innerText="Correct!";

    setTimeout(()=>{
      document.getElementById("quiz-box").classList.add("hidden");
      document.getElementById("answer").value="";
      document.getElementById("feedback").innerText="";
      quizActive=false;
    },1000);

  } else {
    document.getElementById("feedback").innerText="Wrong! Correct: "+currentAnswer;
  }
}

// interrupt every 20s
setInterval(()=>{
  if(!quizActive) showQuestion();
},20000);

// start game
setInterval(draw,150);
</script>

</body>
</html>
