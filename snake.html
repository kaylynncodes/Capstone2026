<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Snake Study Game</title>

<style>
body {
  margin: 0;
  background: black;
  color: white;
  font-family: Arial;
  text-align: center;
}

canvas {
  background: #111;
  display: block;
  margin: auto;
}

#quiz-box {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.95);
  display: flex;
  justify-content: center;
  align-items: center;
}

.quiz-card {
  background: #111;
  padding: 20px;
  border: 2px solid #0f0;
}

.hidden {
  display: none;
}
</style>
</head>

<body>

<h1>Snake Study Game</h1>
<canvas id="game" width="400" height="400"></canvas>

<!-- QUIZ -->
<div id="quiz-box" class="hidden">
  <div class="quiz-card">
    <h2 id="question"></h2>
    <input id="answer" placeholder="Type answer">
    <button onclick="checkAnswer()">Submit</button>
    <p id="feedback"></p>
  </div>
</div>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

let snake = [{x:10,y:10}];
let food = {x:5,y:5};
let dx = 1, dy = 0;

const params = new URLSearchParams(window.location.search);
const mode = params.get("mode") || "emotions";

// STUDY DATA
const questions = {
  emotions: [
    {q:"happy → Spanish",a:"feliz"},
    {q:"sad → Spanish",a:"triste"},
    {q:"enojado → English",a:"angry"}
  ],
  verbs: [
    {q:"I eat → Spanish",a:"yo como"},
    {q:"yo corro → English",a:"i run"}
  ],
  sentences: [
    {q:"I am tired → Spanish",a:"estoy cansado"},
    {q:"ella es mi amiga → English",a:"she is my friend"}
  ]
};

let quizActive = false;
let currentQ = null;

// GAME LOOP
function draw() {
  if (quizActive) return;

  ctx.clearRect(0,0,400,400);

  snake.unshift({x:snake[0].x + dx, y:snake[0].y + dy});

  if (snake[0].x === food.x && snake[0].y === food.y) {
    food = {
      x: Math.floor(Math.random()*20),
      y: Math.floor(Math.random()*20)
    };
  } else {
    snake.pop();
  }

  ctx.fillStyle = "lime";
  snake.forEach(s => ctx.fillRect(s.x*20, s.y*20, 18, 18));

  ctx.fillStyle = "red";
  ctx.fillRect(food.x*20, food.y*20, 18, 18);
}

// CONTROLS
document.addEventListener("keydown", e => {
  if (e.key === "ArrowUp") {dx=0;dy=-1;}
  if (e.key === "ArrowDown") {dx=0;dy=1;}
  if (e.key === "ArrowLeft") {dx=-1;dy=0;}
  if (e.key === "ArrowRight") {dx=1;dy=0;}
});

// STUDY INTERRUPT EVERY 20s
setInterval(() => {
  if (!quizActive) showQuestion();
}, 20000);

function showQuestion() {
  quizActive = true;

  const set = questions[mode];
  currentQ = set[Math.floor(Math.random()*set.length)];

  document.getElementById("question").innerText = currentQ.q;
  document.getElementById("quiz-box").classList.remove("hidden");
}

function checkAnswer() {
  const input = document.getElementById("answer").value.trim().toLowerCase();

  if (input === currentQ.a.toLowerCase()) {
    document.getElementById("feedback").innerText = "Correct!";
    setTimeout(() => {
      document.getElementById("quiz-box").classList.add("hidden");
      document.getElementById("answer").value = "";
      document.getElementById("feedback").innerText = "";
      quizActive = false;
    }, 1000);
  } else {
    document.getElementById("feedback").innerText =
      "Wrong! Answer: " + currentQ.a;
  }
}

// START GAME
setInterval(draw, 150);
</script>

</body>
</html>
