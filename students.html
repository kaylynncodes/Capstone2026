<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Student Stories</title>

<link rel="stylesheet" href="css/styles.css">
<script src="js/navbar.js"></script>
<script src="js/lang.js"></script>

<!-- Bootstrap (modal only) -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

/* SUBTITLE INSTEAD OF CARD */
.subtitle {
  text-align: center;
  margin-top: -10px;
  margin-bottom: 20px;
  font-size: 18px;
  opacity: 0.85;
}

/* MAP LAYOUT (SIDE BY SIDE) */
.map-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 20px;
}

/* MAP */
.map-container {
  position: relative;
}

.map-container img {
  width: 100%;
  border-radius: 15px;
}

/* DOT */
.dot {
  position: absolute;
  width: 14px;
  height: 14px;
  background: #ff4d6d;
  border-radius: 50%;
  cursor: pointer;
  border: 2px solid white;
  transform: translate(-50%, -50%);
  transition: 0.2s;
}

.dot:hover {
  transform: translate(-50%, -50%) scale(1.3);
}

/* MODAL DARK THEME */
.modal-content {
  background: rgba(20,20,30,0.95);
  color: white;
  border-radius: 15px;
}

.modal-header {
  border-bottom: 1px solid rgba(255,255,255,0.2);
}

.modal-body {
  color: white;
}

</style>
</head>

<body>

<div class="container">

<h1 data-key="students">Student Stories</h1>

<p class="subtitle">
Click a location to hear a real student story
</p>

<div class="card">

  <div class="map-grid">

    <!-- 🇺🇸 US MAP -->
    <div class="map-container">
      <img src="US.jpeg" alt="US Map">

      <!-- TEXAS -->
      <div class="dot" style="top:70%; left:40%;" onclick="openCard(stories.jose)"></div>
      <div class="dot" style="top:73%; left:42%;" onclick="openCard(stories.hailey)"></div>
      <div class="dot" style="top:67%; left:38%;" onclick="openCard(stories.michelle)"></div>

      <!-- NEW JERSEY -->
      <div class="dot" style="top:40%; left:85%;" onclick="openCard(stories.nada)"></div>

      <!-- GEORGIA -->
      <div class="dot" style="top:65%; left:75%;" onclick="openCard(stories.tracy)"></div>

      <!-- INDIANA -->
      <div class="dot" style="top:45%; left:55%;" onclick="openCard(stories.indiana)"></div>
    </div>

    <!-- 🌍 WORLD MAP -->
    <div class="map-container">
      <img src="World.jpeg" alt="World Map">

      <!-- KAZAKHSTAN -->
      <div class="dot" style="top:45%; left:65%;" onclick="openCard(stories.murk)"></div>
    </div>

  </div>

</div>

</div>

<!-- MODAL -->
<div class="modal fade" id="storyModal" tabindex="-1">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content">

      <div class="modal-header">
        <h5 id="modalTitle"></h5>
        <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
      </div>

      <div class="modal-body">
        <p id="modalText"></p>
      </div>

    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

<script>

const stories = {

  jose: {
    title: "Jose — Texas",
    text: "Grew up between Mexico and Texas. Felt out of place hearing English at first, but improved through conversation. ESL helped but limited his class opportunities."
  },

  hailey: {
    title: "Hailey — Texas",
    text: "Fluent in both Spanish and English from a young age. Credits early exposure and confidence for her success."
  },

  michelle: {
    title: "Michelle — Texas",
    text: "Transitioned from bilingual education to full English classes. Initially intimidated but adapted through immersion."
  },

  nada: {
    title: "Nada — New Jersey",
    text: "Speaks Tashelhit, Arabic, and English. Faced pressure to stop using her native language but found identity through culture and music."
  },

  tracy: {
    title: "Tracy — Georgia",
    text: "Speaks Hakha Chin and English. Now more comfortable in English but worries about losing connection to native languages."
  },

  indiana: {
    title: "Indiana Student",
    text: "A student reconnecting with identity and heritage through language and storytelling."
  },

  murk: {
    title: "Murk — Kazakhstan",
    text: "Russian speaker learning English. Found learning difficult and believes it should be more engaging."
  }

};

function openCard(story){
  document.getElementById("modalTitle").innerText = story.title;
  document.getElementById("modalText").innerText = story.text;

  const modal = new bootstrap.Modal(document.getElementById('storyModal'));
  modal.show();
}

</script>

</body>
</html>
