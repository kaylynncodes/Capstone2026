<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Student Stories</title>

<link rel="stylesheet" href="css/styles.css">
<script src="js/navbar.js"></script>
<script src="js/lang.js"></script>

<!-- Bootstrap (ONLY for modal) -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

/* KEEP YOUR STYLE.CSS LOOK */
.map-section {
  max-width: 1000px;
  margin: 30px auto;
}

/* MAP */
.map-container {
  position: relative;
  width: 100%;
}

.map-container img {
  width: 100%;
  border-radius: 15px;
}

/* DOTS */
.dot {
  position: absolute;
  width: 14px;
  height: 14px;
  background: #ff4d6d;
  border-radius: 50%;
  cursor: pointer;
  border: 2px solid white;
  transform: translate(-50%, -50%);
  transition: 0.2s;
}

.dot:hover {
  transform: translate(-50%, -50%) scale(1.3);
}

/* LEGEND */
.legend {
  text-align: center;
  margin-top: 15px;
  opacity: 0.8;
}

</style>
</head>

<body>

<div class="container">

<h1 data-key="students">Student Stories</h1>

<div class="card">
<p>Click a location to hear a real student story.</p>
</div>

<div class="card map-section">

  <div class="map-container">

    <!-- YOUR IMAGE -->
    <img src="US.jpeg" alt="Map">

    <!-- TEXAS (multiple students stacked slightly) -->
    <div class="dot" style="top:70%; left:40%;" onclick="openCard(stories.jose)"></div>
    <div class="dot" style="top:73%; left:42%;" onclick="openCard(stories.hailey)"></div>
    <div class="dot" style="top:67%; left:38%;" onclick="openCard(stories.michelle)"></div>

    <!-- NEW JERSEY -->
    <div class="dot" style="top:40%; left:85%;" onclick="openCard(stories.nada)"></div>

    <!-- GEORGIA -->
    <div class="dot" style="top:65%; left:75%;" onclick="openCard(stories.tracy)"></div>

    <!-- MIDWEST (Indiana-ish) -->
    <div class="dot" style="top:45%; left:55%;" onclick="openCard(stories.indiana)"></div>

    <!-- KAZAKHSTAN (outside US for now bottom corner) -->
    <div class="dot" style="top:90%; left:90%;" onclick="openCard(stories.murk)"></div>

  </div>

  <div class="legend">
    Click a dot to explore a student story
  </div>

</div>

</div>

<!-- MODAL -->
<div class="modal fade" id="storyModal" tabindex="-1">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content">

      <div class="modal-header">
        <h5 id="modalTitle"></h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>

      <div class="modal-body">
        <p id="modalText"></p>
      </div>

    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

<script>

/* 🔥 YOUR REAL DATA CONNECTED */

const stories = {

  jose: {
    title: "Jose — Texas",
    text: "Grew up between Mexico and Texas. Felt out of place hearing English at first, but improved through conversation. ESL helped, but limited his class choices. Biggest struggle: confidence when speaking."
  },

  hailey: {
    title: "Hailey — Texas",
    text: "Fluent in Spanish and English. Learned English early through school and media. Believes patience is key and encourages others not to give up."
  },

  michelle: {
    title: "Michelle — Texas",
    text: "Transitioned from bilingual elementary school to all-English classes. Felt intimidated at first but improved through immersion and determination."
  },

  nada: {
    title: "Nada — New Jersey",
    text: "Speaks Tashelhit, Arabic, and English. Felt like an outsider in ESL but found connection through culture and music. Faced pressure to stop speaking her native language."
  },

  tracy: {
    title: "Tracy — Georgia",
    text: "Speaks Hakha Chin and English. Grew up surrounded by similar communities. Now feels more comfortable in English but struggles maintaining native languages."
  },

  indiana: {
    title: "Indiana Student",
    text: "A student reconnecting with heritage and identity through language and storytelling."
  },

  murk: {
    title: "Murk — Kazakhstan",
    text: "Russian speaker learning English. Found learning difficult but believes it should be more engaging."
  }

};

/* MODAL FUNCTION */
function openCard(story){
  document.getElementById("modalTitle").innerText = story.title;
  document.getElementById("modalText").innerText = story.text;

  const modal = new bootstrap.Modal(document.getElementById('storyModal'));
  modal.show();
}

</script>

</body>
</html>
